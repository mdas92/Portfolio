<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="expBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1F0D"/>
      <stop offset="100%" style="stop-color:#1A2A1A"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#expBg)"/>
  <pattern id="dots3" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.5" fill="#FFFFFF" opacity="0.05"/>
  </pattern>
  <rect width="800" height="500" fill="url(#dots3)"/>

  <!-- Donut chart concept (right side) -->
  <g transform="translate(520, 200)">
    <!-- Outer ring segments -->
    <circle cx="120" cy="120" r="110" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Spend arc (large) -->
    <path d="M 120 10 A 110 110 0 1 1 28 180" fill="none" stroke="#FF4530" stroke-width="28" stroke-linecap="round" opacity="0.85"/>
    <!-- Savings arc (small) -->
    <path d="M 28 180 A 110 110 0 0 1 120 10" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="28" stroke-linecap="round"/>
    <!-- Inner circle -->
    <circle cx="120" cy="120" r="78" fill="#0D1F0D"/>
    <text x="120" y="110" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle">30%</text>
    <text x="120" y="136" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">DON'T TRACK</text>
  </g>

  <!-- Title -->
  <rect x="60" y="60" width="4" height="48" rx="2" fill="#FF4530"/>
  <text x="80" y="92" font-family="Georgia, serif" font-size="26" font-weight="600" fill="#FFFFFF" letter-spacing="-0.5">Exploring Expense</text>
  <text x="80" y="126" font-family="Georgia, serif" font-size="26" font-weight="300" font-style="italic" fill="rgba(255,255,255,0.65)">Management</text>
  <text x="80" y="154" font-family="system-ui, sans-serif" font-size="11" fill="#FF4530" letter-spacing="3">CONTENT STRATEGY · IA · LAZYPAY</text>

  <!-- Key stat chips -->
  <g transform="translate(80, 190)">
    <rect x="0" y="0" width="140" height="60" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="70" y="24" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#FF4530" text-anchor="middle">40%</text>
    <text x="70" y="44" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">want to save more</text>

    <rect x="156" y="0" width="140" height="60" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="226" y="24" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">33%</text>
    <text x="226" y="44" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">struggle with savings</text>

    <rect x="312" y="0" width="140" height="60" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="382" y="24" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">14%</text>
    <text x="382" y="44" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">use an app today</text>
  </g>

  <!-- Pitch statement -->
  <rect x="80" y="290" width="360" height="1" fill="rgba(255,69,48,0.4)"/>
  <text x="80" y="318" font-family="Georgia, serif" font-size="17" font-style="italic" fill="rgba(255,255,255,0.55)">Primary pitch: "Manage your money"</text>

  <!-- Bottom bar -->
  <rect x="0" y="420" width="800" height="80" fill="rgba(0,0,0,0.4)"/>
  <text x="80" y="452" font-family="system-ui, sans-serif" font-size="11" fill="#737373" letter-spacing="2">ROLE</text>
  <text x="80" y="476" font-family="Georgia, serif" font-size="20" font-weight="600" fill="#FFFFFF">Sole UX Writer</text>
  <text x="280" y="452" font-family="system-ui, sans-serif" font-size="11" fill="#737373" letter-spacing="2">DURATION</text>
  <text x="280" y="476" font-family="Georgia, serif" font-size="20" font-weight="600" fill="#FFFFFF">2 weeks</text>
  <text x="460" y="452" font-family="system-ui, sans-serif" font-size="11" fill="#737373" letter-spacing="2">STATUS</text>
  <text x="460" y="476" font-family="Georgia, serif" font-size="20" font-weight="600" fill="#FFFFFF">In progress · Confidential</text>
</svg>