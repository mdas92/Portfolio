<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <rect width="800" height="440" fill="#FAFAFA"/>

  <rect x="48" y="36" width="8" height="2" fill="#FF4530"/>
  <text x="64" y="40" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" letter-spacing="3">CONTENT-FIRST DESIGN</text>
  <text x="48" y="76" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="600" fill="#111111" letter-spacing="-0.5">Notification Content Hierarchy</text>
  <text x="48" y="100" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="13" fill="#737373">What information to show — and in what order — on the repayment component.</text>

  <!-- Column headers -->
  <line x1="48" y1="118" x2="752" y2="118" stroke="#E0E0E0" stroke-width="1"/>
  <text x="56" y="136" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" letter-spacing="2">PRIORITY</text>
  <text x="200" y="136" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" letter-spacing="2">EXAMPLE TEXT</text>
  <text x="420" y="136" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" letter-spacing="2">PURPOSE</text>
  <text x="700" y="136" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" letter-spacing="2" text-anchor="end">ESSENTIAL</text>
  <line x1="48" y1="144" x2="752" y2="144" stroke="#E0E0E0" stroke-width="1"/>

  <rect x="48" y="144" width="704" height="46" fill="rgba(255,69,48,0.04)"/>
  <circle cx="70" cy="167" r="6" fill="#FF4530"/>
  <text x="88" y="172" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="12" font-weight="500" fill="#111111">1 — Amount</text>
  <text x="200" y="172" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="12" fill="#111111">₹2,450 due now</text>
  <text x="420" y="172" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">How much the user owes — primary action trigger</text>
  <text x="700" y="172" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" font-weight="600" fill="#FF4530" text-anchor="end">Yes</text>
  <line x1="48" y1="190" x2="752" y2="190" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="48" y="190" width="704" height="46" fill="rgba(255,69,48,0.04)"/>
  <circle cx="70" cy="213" r="6" fill="#FF4530"/>
  <text x="88" y="218" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="12" font-weight="500" fill="#111111">2 — Due date</text>
  <text x="200" y="218" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="12" fill="#111111">Due today</text>
  <text x="420" y="218" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">Creates time-based urgency and context</text>
  <text x="700" y="218" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" font-weight="600" fill="#FF4530" text-anchor="end">Yes</text>
  <line x1="48" y1="236" x2="752" y2="236" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="48" y="236" width="704" height="46" fill="rgba(255,69,48,0.04)"/>
  <circle cx="70" cy="259" r="6" fill="#FF4530"/>
  <text x="88" y="264" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="12" font-weight="500" fill="#111111">3 — Due status</text>
  <text x="200" y="264" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="12" fill="#111111">OVERDUE / UPCOMING</text>
  <text x="420" y="264" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">Shows whether breach has occurred</text>
  <text x="700" y="264" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" font-weight="600" fill="#FF4530" text-anchor="end">Yes</text>
  <line x1="48" y1="282" x2="752" y2="282" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="48" y="282" width="704" height="46" fill="#FAFAFA"/>
  <circle cx="70" cy="305" r="6" fill="#E0E0E0"/>
  <text x="88" y="310" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="12" font-weight="500" fill="#111111">4 — Penalties</text>
  <text x="200" y="310" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="12" fill="#111111">Late fee after midnight</text>
  <text x="420" y="310" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">Consequences — motivates action beyond just awareness</text>
  <text x="700" y="310" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" font-weight="600" fill="#737373" text-anchor="end">—</text>
  <line x1="48" y1="328" x2="752" y2="328" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="48" y="328" width="704" height="46" fill="#FAFAFA"/>
  <circle cx="70" cy="351" r="6" fill="#E0E0E0"/>
  <text x="88" y="356" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="12" font-weight="500" fill="#111111">5 — Count</text>
  <text x="200" y="356" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="12" fill="#111111">1 of 3 EMIs</text>
  <text x="420" y="356" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">Scope of what's owed, especially for multi-product</text>
  <text x="700" y="356" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" font-weight="600" fill="#737373" text-anchor="end">—</text>
  <line x1="48" y1="374" x2="752" y2="374" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="48" y="374" width="704" height="46" fill="#FAFAFA"/>
  <circle cx="70" cy="397" r="6" fill="#E0E0E0"/>
  <text x="88" y="402" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="12" font-weight="500" fill="#111111">6 — Product</text>
  <text x="200" y="402" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="12" fill="#111111">LazyPay Later</text>
  <text x="420" y="402" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">Identifies which product line is due</text>
  <text x="700" y="402" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" font-weight="600" fill="#737373" text-anchor="end">—</text>
  <line x1="48" y1="420" x2="752" y2="420" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="190" y1="118" x2="190" y2="420" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="410" y1="118" x2="410" y2="420" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="660" y1="118" x2="660" y2="420" stroke="#E0E0E0" stroke-width="1"/>
</svg>