<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <rect width="800" height="440" fill="#FFFCF0"/>
  <circle cx="60" cy="400" r="140" fill="#C45C26" opacity="0.15"/>

  <g font-family="'Space Grotesk', sans-serif" fill="#0D3B2E">
    <rect x="48" y="30" width="8" height="2" fill="#C45C26"/>
    <text x="64" y="34" font-size="10" opacity="0.6" letter-spacing="3">USER JOURNEY</text>
  </g>

  <!-- three day columns -->
  <g font-family="'Space Grotesk', sans-serif">
    <!-- Day 1 -->
    <g transform="translate(48,60)">
      <rect x="0" y="0" width="220" height="360" rx="10" fill="none" stroke="#0D3B2E" stroke-width="2"/>
      <rect x="0" y="0" width="220" height="4" fill="#0D3B2E"/>
      <text x="16" y="34" font-size="15" font-weight="700" fill="#0D3B2E">DAY 1</text>
      <text x="16" y="52" font-size="10" fill="#0D3B2E" opacity="0.65">Statement generated</text>

      <rect x="16" y="70" width="188" height="46" rx="6" fill="none" stroke="#0D3B2E" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="26" y="90" font-size="9" fill="#0D3B2E">WhatsApp</text>
      <text x="26" y="104" font-size="8" fill="#0D3B2E" opacity="0.6">Bill amount &amp; due date</text>

      <rect x="16" y="124" width="188" height="46" rx="6" fill="none" stroke="#0D3B2E" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="26" y="144" font-size="9" fill="#0D3B2E">SMS</text>
      <text x="26" y="158" font-size="8" fill="#0D3B2E" opacity="0.6">Statement generated</text>

      <rect x="16" y="178" width="188" height="46" rx="6" fill="none" stroke="#0D3B2E" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="26" y="198" font-size="9" fill="#0D3B2E">Email</text>
      <text x="26" y="212" font-size="8" fill="#0D3B2E" opacity="0.6">Payment summary</text>

      <rect x="52" y="250" width="116" height="86" rx="14" fill="none" stroke="#0D3B2E" stroke-width="2"/>
      <rect x="64" y="264" width="92" height="24" rx="4" fill="#C45C26"/>
      <text x="110" y="280" text-anchor="middle" font-size="8" font-weight="700" fill="#FFFCF0">₹9,750 DUE</text>
    </g>

    <!-- Day 2 -->
    <g transform="translate(290,60)">
      <rect x="0" y="0" width="220" height="360" rx="10" fill="none" stroke="#0D3B2E" stroke-width="2"/>
      <rect x="0" y="0" width="220" height="4" fill="#C45C26"/>
      <text x="16" y="34" font-size="15" font-weight="700" fill="#0D3B2E">DAY 2</text>
      <text x="16" y="52" font-size="10" fill="#0D3B2E" opacity="0.65">Day before due date</text>

      <rect x="16" y="70" width="188" height="46" rx="6" fill="none" stroke="#C45C26" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="26" y="90" font-size="9" fill="#C45C26" font-weight="700">SMS · Due tomorrow</text>
      <text x="26" y="104" font-size="8" fill="#0D3B2E" opacity="0.6">Clear your dues</text>

      <rect x="16" y="124" width="188" height="46" rx="6" fill="none" stroke="#0D3B2E" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="26" y="144" font-size="9" fill="#0D3B2E">In-app card</text>
      <text x="26" y="158" font-size="8" fill="#0D3B2E" opacity="0.6">Homescreen banner</text>

      <rect x="16" y="178" width="188" height="46" rx="6" fill="none" stroke="#0D3B2E" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="26" y="198" font-size="9" fill="#0D3B2E">Email</text>
      <text x="26" y="212" font-size="8" fill="#0D3B2E" opacity="0.6">Payment due reminder</text>

      <rect x="52" y="250" width="116" height="86" rx="14" fill="none" stroke="#0D3B2E" stroke-width="2"/>
      <rect x="64" y="264" width="92" height="24" rx="4" fill="#C45C26"/>
      <text x="110" y="280" text-anchor="middle" font-size="8" font-weight="700" fill="#FFFCF0">DUE TOMORROW</text>
    </g>

    <!-- Day 3 -->
    <g transform="translate(532,60)">
      <rect x="0" y="0" width="220" height="360" rx="10" fill="none" stroke="#0D3B2E" stroke-width="2"/>
      <rect x="0" y="0" width="220" height="4" fill="#C45C26"/>
      <text x="16" y="34" font-size="15" font-weight="700" fill="#0D3B2E">DAY 3</text>
      <text x="16" y="52" font-size="10" fill="#0D3B2E" opacity="0.65">Due date</text>

      <rect x="16" y="70" width="188" height="46" rx="6" fill="none" stroke="#C45C26" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="26" y="90" font-size="9" fill="#C45C26" font-weight="700">SMS · Outstanding today</text>
      <text x="26" y="104" font-size="8" fill="#0D3B2E" opacity="0.6">Pay now to avoid fees</text>

      <rect x="16" y="124" width="188" height="46" rx="6" fill="none" stroke="#C45C26" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="26" y="144" font-size="9" fill="#C45C26" font-weight="700">SMS · Repeated</text>
      <text x="26" y="158" font-size="8" fill="#0D3B2E" opacity="0.6">Final reminder</text>

      <rect x="16" y="178" width="188" height="46" rx="6" fill="none" stroke="#0D3B2E" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="26" y="198" font-size="9" fill="#0D3B2E">Email</text>
      <text x="26" y="212" font-size="8" fill="#0D3B2E" opacity="0.6">Last chance to pay</text>

      <rect x="52" y="250" width="116" height="86" rx="14" fill="none" stroke="#0D3B2E" stroke-width="2"/>
      <rect x="64" y="264" width="92" height="24" rx="4" fill="#C45C26"/>
      <text x="110" y="280" text-anchor="middle" font-size="8" font-weight="700" fill="#FFFCF0">DUE SINCE TODAY</text>
    </g>
  </g>
</svg>
