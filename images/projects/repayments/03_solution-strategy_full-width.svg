<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#FFFCF0"/>

  <g font-family="'Space Grotesk', sans-serif" fill="#0D3B2E">
    <rect x="48" y="30" width="8" height="2" fill="#C45C26"/>
    <text x="64" y="34" font-size="10" opacity="0.6" letter-spacing="3">SOLUTION STRATEGY</text>
  </g>

  <g font-family="'Space Grotesk', sans-serif">
    <!-- Card 1 -->
    <g transform="translate(48,58)">
      <rect x="0" y="0" width="216" height="300" rx="12" fill="#FFFCF0" stroke="#0D3B2E" stroke-width="2"/>
      <rect x="0" y="0" width="216" height="6" rx="3" fill="#C45C26"/>
      <text x="20" y="52" font-family="'DM Serif Display', serif" font-size="30" fill="#C45C26" opacity="0.3">01</text>
      <text x="20" y="82" font-size="15" font-weight="700" fill="#0D3B2E">Discoverability</text>

      <text x="20" y="110" font-size="9.5" fill="#0D3B2E" opacity="0.55" letter-spacing="1.5">PROBLEM</text>
      <text x="20" y="128" font-size="10.5" fill="#0D3B2E" opacity="0.7">Users didn't know their</text>
      <text x="20" y="144" font-size="10.5" fill="#0D3B2E" opacity="0.7">due date — reminders</text>
      <text x="20" y="160" font-size="10.5" fill="#0D3B2E" opacity="0.7">blended into the UI.</text>

      <line x1="20" y1="188" x2="196" y2="188" stroke="#0D3B2E" stroke-width="1" opacity="0.2"/>
      <text x="20" y="208" font-size="9.5" fill="#C45C26" letter-spacing="1.5">SOLUTION</text>
      <text x="20" y="228" font-size="10.5" fill="#0D3B2E">Redesigned card with</text>
      <text x="20" y="244" font-size="10.5" fill="#0D3B2E">clearer placement and</text>
      <text x="20" y="260" font-size="10.5" fill="#0D3B2E">stronger hierarchy.</text>
    </g>

    <!-- Card 2 -->
    <g transform="translate(292,58)">
      <rect x="0" y="0" width="216" height="300" rx="12" fill="#FFFCF0" stroke="#0D3B2E" stroke-width="2"/>
      <rect x="0" y="0" width="216" height="6" rx="3" fill="#0D3B2E"/>
      <text x="20" y="52" font-family="'DM Serif Display', serif" font-size="30" fill="#0D3B2E" opacity="0.25">02</text>
      <text x="20" y="82" font-size="15" font-weight="700" fill="#0D3B2E">Urgency</text>

      <text x="20" y="110" font-size="9.5" fill="#0D3B2E" opacity="0.55" letter-spacing="1.5">PROBLEM</text>
      <text x="20" y="128" font-size="10.5" fill="#0D3B2E" opacity="0.7">Reminders were seen but</text>
      <text x="20" y="144" font-size="10.5" fill="#0D3B2E" opacity="0.7">deferred — no visible</text>
      <text x="20" y="160" font-size="10.5" fill="#0D3B2E" opacity="0.7">change after due date.</text>

      <line x1="20" y1="188" x2="196" y2="188" stroke="#0D3B2E" stroke-width="1" opacity="0.2"/>
      <text x="20" y="208" font-size="9.5" fill="#C45C26" letter-spacing="1.5">SOLUTION</text>
      <text x="20" y="228" font-size="10.5" fill="#0D3B2E">New bottom sheet after</text>
      <text x="20" y="244" font-size="10.5" fill="#0D3B2E">breach, that persists</text>
      <text x="20" y="260" font-size="10.5" fill="#0D3B2E">until dues are cleared.</text>
    </g>

    <!-- Card 3 -->
    <g transform="translate(536,58)">
      <rect x="0" y="0" width="216" height="300" rx="12" fill="#FFFCF0" stroke="#0D3B2E" stroke-width="2"/>
      <rect x="0" y="0" width="216" height="6" rx="3" fill="#C5F135"/>
      <text x="20" y="52" font-family="'DM Serif Display', serif" font-size="30" fill="#0D3B2E" opacity="0.2">03</text>
      <text x="20" y="82" font-size="15" font-weight="700" fill="#0D3B2E">Transparency</text>

      <text x="20" y="110" font-size="9.5" fill="#0D3B2E" opacity="0.55" letter-spacing="1.5">PROBLEM</text>
      <text x="20" y="128" font-size="10.5" fill="#0D3B2E" opacity="0.7">Late fees weren't shown</text>
      <text x="20" y="144" font-size="10.5" fill="#0D3B2E" opacity="0.7">upfront, and the CTA on</text>
      <text x="20" y="160" font-size="10.5" fill="#0D3B2E" opacity="0.7">repayment was unclear.</text>

      <line x1="20" y1="188" x2="196" y2="188" stroke="#0D3B2E" stroke-width="1" opacity="0.2"/>
      <text x="20" y="208" font-size="9.5" fill="#C45C26" letter-spacing="1.5">SOLUTION</text>
      <text x="20" y="228" font-size="10.5" fill="#0D3B2E">Surfaced consequences</text>
      <text x="20" y="244" font-size="10.5" fill="#0D3B2E">plainly, rebuilt hierarchy,</text>
      <text x="20" y="260" font-size="10.5" fill="#0D3B2E">cleaner call to action.</text>
    </g>
  </g>
</svg>
