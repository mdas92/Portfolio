      <text x="122" y="34" text-anchor="middle" font-size="8" font-weight="700" fill="#C45C26">Dues</text>

      <circle cx="214" cy="10" r="10" fill="none" stroke="#0D3B2E" stroke-width="1.2" opacity="0.6"/>
      <text x="214" y="34" text-anchor="middle" font-size="8" opacity="0.6">Profile</text>
