      <text x="140" y="222" text-anchor="middle" font-size="11" opacity="0.8">with your limit!</text>
      <circle cx="140" cy="242" r="4" fill="#C5F135" opacity="0.6"/>

      <rect x="28" y="500" width="224" height="52" rx="10" fill="none" stroke="#FFFCF0" stroke-width="0.75" opacity="0.22"/>
