<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 700" width="340" height="700">
  <rect width="340" height="700" fill="#FFFCF0"/>

  <g transform="translate(20,20)">
    <rect x="0" y="0" width="300" height="620" rx="36" fill="#0D3B2E"/>
    <rect x="10" y="10" width="280" height="600" rx="26" fill="#12332A"/>
    <rect x="122" y="22" width="56" height="7" rx="3.5" fill="#FFFCF0" opacity="0.2"/>

    <g font-family="'Space Grotesk', sans-serif" fill="#FFFCF0">
      <rect x="28" y="50" width="112" height="34" rx="8" fill="none" stroke="#C5F135" stroke-width="1.2" opacity="0.7"/>
      <text x="84" y="71" text-anchor="middle" font-size="9" opacity="0.8">PayLater</text>

      <text x="28" y="126" font-size="24" font-weight="700">₹9,750</text>
