<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="repBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A0A06"/>
      <stop offset="100%" style="stop-color:#1A0A0A"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#repBg)"/>
  <pattern id="dots4" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.5" fill="#FFFFFF" opacity="0.04"/>
  </pattern>
  <rect width="800" height="500" fill="url(#dots4)"/>

  <!-- Phone notification mockup (right side) -->
  <g transform="translate(420, 60)">
    <!-- Phone shell -->
    <rect x="80" y="0" width="240" height="390" rx="28" fill="#1A1A1A" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="80" y="0" width="240" height="390" rx="28" fill="rgba(255,255,255,0.03)"/>
    <!-- Notch -->
    <rect x="158" y="10" width="84" height="20" rx="10" fill="#0A0A0A"/>

    <!-- Notification card - BEFORE (top) -->
    <rect x="96" y="50" width="208" height="60" rx="8" fill="#2A2A2A"/>
    <text x="112" y="74" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">LazyPay · Due in 3 days</text>
    <text x="112" y="96" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">You have pending dues</text>
    <rect x="96" y="50" width="208" height="2" rx="1" fill="rgba(255,255,255,0.1)"/>

    <!-- "Before" label -->
    <text x="200" y="128" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">BEFORE</text>

    <!-- Notification card - AFTER -->
    <rect x="96" y="148" width="208" height="86" rx="8" fill="#FF4530"/>
    <text x="112" y="170" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">LazyPay · Due TODAY</text>
    <text x="112" y="190" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">₹2,450 due now</text>
    <text x="112" y="210" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">Late fee applies after midnight</text>
    <rect x="130" y="220" width="120" height="6" rx="3" fill="rgba(255,255,255,0.25)"/>

    <!-- "After" label -->
    <text x="200" y="252" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">AFTER</text>
  </g>

  <!-- Title + stats left -->
  <rect x="60" y="60" width="4" height="48" rx="2" fill="#FF4530"/>
  <text x="80" y="92" font-family="Georgia, serif" font-size="26" font-weight="600" fill="#FFFFFF">Improving</text>
  <text x="80" y="126" font-family="Georgia, serif" font-size="26" font-weight="300" font-style="italic" fill="rgba(255,255,255,0.65)">Repayment Rates</text>
  <text x="80" y="154" font-family="system-ui, sans-serif" font-size="11" fill="#FF4530" letter-spacing="3">CONTENT-FIRST DESIGN · LAZYPAY</text>

  <!-- Key stats -->
  <text x="80" y="220" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)" letter-spacing="2">KEY NUMBERS</text>

  <text x="80" y="268" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#FF4530" opacity="0.95">45%</text>
  <text x="80" y="296" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">of new users not repaying on time</text>

  <text x="80" y="348" font-family="Georgia, serif" font-size="52" font-weight="700" fill="rgba(255,255,255,0.85)">23%</text>
  <text x="80" y="376" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">opened app but still didn't pay</text>

  <!-- Bottom bar -->
  <rect x="0" y="430" width="800" height="70" fill="rgba(0,0,0,0.5)"/>
  <text x="80" y="458" font-family="system-ui, sans-serif" font-size="10" fill="#737373" letter-spacing="2">TARGET IMPROVEMENT</text>
  <text x="80" y="482" font-family="Georgia, serif" font-size="20" font-weight="600" fill="#FF4530">+10% on-time repayment rate</text>
  <text x="440" y="458" font-family="system-ui, sans-serif" font-size="10" fill="#737373" letter-spacing="2">DURATION</text>
  <text x="440" y="482" font-family="Georgia, serif" font-size="20" font-weight="600" fill="#FFFFFF">1 month</text>
</svg>