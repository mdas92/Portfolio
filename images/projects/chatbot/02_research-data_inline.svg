<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#FAFAFA"/>

  <!-- Section label -->
  <rect x="48" y="40" width="8" height="2" fill="#FF4530"/>
  <text x="64" y="44" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" letter-spacing="3">RESEARCH INSIGHT</text>
  <text x="48" y="80" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="600" fill="#111111" letter-spacing="-0.5">Top Query Categories</text>
  <text x="48" y="104" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="13" fill="#737373">Share of 50,000+ monthly call centre queries (avg.)</text>

  <!-- Chart area -->
  <!-- Bar 1 -->
  <text x="48" y="127" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#111111">Account Related</text>
  <rect x="48" y="135" width="600" height="52" rx="4" fill="#E0E0E0" opacity="0.5"/>
  <rect x="48" y="135" width="506" height="52" rx="4" fill="#FF4530" opacity="1.00"/>
  <text x="566" y="166" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="600" fill="#FF4530">21.1%</text>
  <text x="48" y="205" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373">Can't log in, blocked accounts, deletion</text>
  <!-- Bar 2 -->
  <text x="48" y="207" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#111111">Loans &amp; EMIs</text>
  <rect x="48" y="215" width="600" height="52" rx="4" fill="#E0E0E0" opacity="0.5"/>
  <rect x="48" y="215" width="350" height="52" rx="4" fill="#FF4530" opacity="0.88"/>
  <text x="410" y="246" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="600" fill="#FF4530">14.6%</text>
  <text x="48" y="285" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373">Status, count, foreclosure queries</text>
  <!-- Bar 3 -->
  <text x="48" y="287" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#111111">Charges &amp; Fees</text>
  <rect x="48" y="295" width="600" height="52" rx="4" fill="#E0E0E0" opacity="0.5"/>
  <rect x="48" y="295" width="146" height="52" rx="4" fill="#FF4530" opacity="0.76"/>
  <text x="206" y="326" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="600" fill="#FF4530">6.1%</text>
  <text x="48" y="365" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373">Fee structures, interest, waivers</text>

  <!-- Note -->
  <rect x="48" y="375" width="700" height="1" fill="#E0E0E0"/>
  <text x="48" y="394" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373">Source: Monthly customer care reports · used to define the chatbot's category tree</text>
</svg>