<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <rect width="800" height="360" fill="#FAFAFA"/>

  <rect x="48" y="36" width="8" height="2" fill="#FF4530"/>
  <text x="64" y="40" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" letter-spacing="3">CONTENT STRATEGY</text>
  <text x="48" y="76" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="600" fill="#111111" letter-spacing="-0.5">User Journey — LazyCard</text>

  <!-- Stage 1 -->
  <rect x="48" y="108" width="164" height="220" rx="6" fill="#F2F2F2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="48" y="108" width="164" height="4" rx="2" fill="#FF4530" opacity="0.50"/>
  <text x="64" y="142" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#FF4530" opacity="0.2">1</text>
  <text x="64" y="172" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="14" font-weight="600" fill="#111111">Awareness</text>
  <text x="64" y="202" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">Introduced to LazyCard</text>
  <text x="64" y="221" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">via SMS, WhatsApp,</text>
  <text x="64" y="240" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">or in-app banners</text>
  <rect x="64" y="286" width="132" height="1" fill="#E0E0E0"/>
  <text x="64" y="310" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#FF4530" font-style="italic">Curious, Interested</text>
  <polyline points="216,218 224,218" stroke="#FF4530" stroke-width="2" fill="none" opacity="0.5"/>
  <polygon points="224,214 230,218 224,222" fill="#FF4530" opacity="0.5"/>
  <!-- Stage 2 -->
  <rect x="226" y="108" width="164" height="220" rx="6" fill="#F2F2F2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="226" y="108" width="164" height="4" rx="2" fill="#FF4530" opacity="0.65"/>
  <text x="242" y="142" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#FF4530" opacity="0.2">2</text>
  <text x="242" y="172" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="14" font-weight="600" fill="#111111">Consideration</text>
  <text x="242" y="202" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">Explores benefits</text>
  <text x="242" y="221" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">in the LazyPay app,</text>
  <text x="242" y="240" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">decides whether to apply</text>
  <rect x="242" y="286" width="132" height="1" fill="#E0E0E0"/>
  <text x="242" y="310" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#FF4530" font-style="italic">Confused, Excited</text>
  <polyline points="394,218 402,218" stroke="#FF4530" stroke-width="2" fill="none" opacity="0.5"/>
  <polygon points="402,214 408,218 402,222" fill="#FF4530" opacity="0.5"/>
  <!-- Stage 3 -->
  <rect x="404" y="108" width="164" height="220" rx="6" fill="#F2F2F2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="404" y="108" width="164" height="4" rx="2" fill="#FF4530" opacity="0.80"/>
  <text x="420" y="142" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#FF4530" opacity="0.2">3</text>
  <text x="420" y="172" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="14" font-weight="600" fill="#111111">Onboarding</text>
  <text x="420" y="202" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">Decides to get card,</text>
  <text x="420" y="221" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">completes online</text>
  <text x="420" y="240" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">KYC verification</text>
  <rect x="420" y="286" width="132" height="1" fill="#E0E0E0"/>
  <text x="420" y="310" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#FF4530" font-style="italic">Impatient, Hopeful</text>
  <polyline points="572,218 580,218" stroke="#FF4530" stroke-width="2" fill="none" opacity="0.5"/>
  <polygon points="580,214 586,218 580,222" fill="#FF4530" opacity="0.5"/>
  <!-- Stage 4 -->
  <rect x="582" y="108" width="164" height="220" rx="6" fill="#F2F2F2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="582" y="108" width="164" height="4" rx="2" fill="#FF4530" opacity="0.95"/>
  <text x="598" y="142" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#FF4530" opacity="0.2">4</text>
  <text x="598" y="172" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="14" font-weight="600" fill="#111111">Activation</text>
  <text x="598" y="202" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">Receives credit limit,</text>
  <text x="598" y="221" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">activates card and</text>
  <text x="598" y="240" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">starts transacting</text>
  <rect x="598" y="286" width="132" height="1" fill="#E0E0E0"/>
  <text x="598" y="310" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#FF4530" font-style="italic">Happy, Excited</text>
</svg>