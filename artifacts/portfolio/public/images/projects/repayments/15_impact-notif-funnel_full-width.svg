<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <rect width="800" height="440" fill="#FFFCF0"/>
  <circle cx="700" cy="380" r="140" fill="#C5F135" opacity="0.2"/>

  <g font-family="'Space Grotesk', sans-serif" fill="#0D3B2E">
    <rect x="48" y="30" width="8" height="2" fill="#C45C26"/>
    <text x="64" y="34" font-size="10" opacity="0.6" letter-spacing="3">IMPACT · NOTIFICATION CLICK-THROUGH</text>
  </g>

  <!-- Old funnel -->
  <g transform="translate(90,80)" font-family="'Space Grotesk', sans-serif">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#0D3B2E" opacity="0.6">OLD · INLINE BANNER</text>
    <rect x="0" y="20" width="140" height="220" fill="none" stroke="#0D3B2E" stroke-width="2" opacity="0.4"/>
    <rect x="0" y="20" width="140" height="220" fill="#0D3B2E" opacity="0.12"/>
    <rect x="0" y="79" width="140" height="161" fill="#0D3B2E" opacity="0.3"/>
    <text x="70" y="60" text-anchor="middle" font-size="12" fill="#0D3B2E">Notification shown</text>
    <text x="70" y="240" text-anchor="middle" font-size="20" font-weight="700" fill="#0D3B2E">63.76%</text>
    <text x="70" y="258" text-anchor="middle" font-size="10" fill="#0D3B2E" opacity="0.6">reached next step</text>
  </g>

  <path d="M300 200 L360 200" stroke="#0D3B2E" stroke-width="2" stroke-dasharray="4 3" opacity="0.4"/>
  <path d="M356 194 L364 200 L356 206" stroke="#0D3B2E" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- New funnel -->
  <g transform="translate(400,80)" font-family="'Space Grotesk', sans-serif">
