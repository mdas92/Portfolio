  <g transform="translate(600,110)" font-family="'Space Grotesk', sans-serif">
    <path d="M0 60 L0 0" stroke="#C5F135" stroke-width="10" stroke-linecap="round"/>
    <text x="16" y="10" font-size="30" font-weight="700" fill="#0D3B2E">+9pts</text>
