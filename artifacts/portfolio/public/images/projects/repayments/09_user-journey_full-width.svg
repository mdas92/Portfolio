<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <rect width="800" height="380" fill="#FFFCF0"/>

  <g font-family="'Space Grotesk', sans-serif" fill="#0D3B2E">
    <rect x="48" y="26" width="8" height="2" fill="#C45C26"/>
    <text x="64" y="30" font-size="10" opacity="0.6" letter-spacing="3">USER JOURNEY</text>
  </g>

  <g font-family="'Space Grotesk', sans-serif">
    <!-- Day 1 -->
    <g transform="translate(48,54)">
      <rect x="0" y="0" width="222" height="300" rx="10" fill="none" stroke="#0D3B2E" stroke-width="2" opacity="0.85"/>
      <rect x="0" y="0" width="222" height="4" fill="#0D3B2E"/>
      <text x="18" y="30" font-size="14" font-weight="700" fill="#0D3B2E">DAY 1</text>
      <text x="18" y="46" font-size="9.5" fill="#0D3B2E" opacity="0.6">Statement generated</text>

      <g font-size="9" fill="#0D3B2E">
        <circle cx="24" cy="68" r="3" fill="#0D3B2E"/>
        <text x="34" y="72">WhatsApp — bill &amp; due date</text>
        <circle cx="24" cy="90" r="3" fill="#0D3B2E"/>
        <text x="34" y="94">SMS — statement ready</text>
        <circle cx="24" cy="112" r="3" fill="#0D3B2E"/>
        <text x="34" y="116">Email — payment summary</text>
      </g>

      <rect x="18" y="234" width="186" height="48" rx="10" fill="#0D3B2E"/>
      <text x="111" y="255" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFCF0">₹9,750 due</text>
      <text x="111" y="270" text-anchor="middle" font-size="8.5" fill="#FFFCF0" opacity="0.75">3 days remaining</text>
    </g>

    <!-- Day 2 -->
    <g transform="translate(289,54)">
      <rect x="0" y="0" width="222" height="300" rx="10" fill="none" stroke="#C45C26" stroke-width="2"/>
      <rect x="0" y="0" width="222" height="4" fill="#C45C26"/>
      <text x="18" y="30" font-size="14" font-weight="700" fill="#0D3B2E">DAY 2</text>
      <text x="18" y="46" font-size="9.5" fill="#0D3B2E" opacity="0.6">Day before due date</text>

      <g font-size="9" fill="#0D3B2E">
        <circle cx="24" cy="68" r="3" fill="#C45C26"/>
        <text x="34" y="72" font-weight="700" fill="#C45C26">SMS — due tomorrow</text>
        <circle cx="24" cy="90" r="3" fill="#0D3B2E"/>
        <text x="34" y="94">In-app card on homescreen</text>
        <circle cx="24" cy="112" r="3" fill="#0D3B2E"/>
        <text x="34" y="116">Email — reminder</text>
      </g>

      <rect x="18" y="234" width="186" height="48" rx="10" fill="#C45C26"/>
      <text x="111" y="255" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFCF0">Due tomorrow</text>
      <text x="111" y="270" text-anchor="middle" font-size="8.5" fill="#FFFCF0" opacity="0.85">Clear your dues today</text>
    </g>

    <!-- Day 3 -->
    <g transform="translate(530,54)">
      <rect x="0" y="0" width="222" height="300" rx="10" fill="none" stroke="#C45C26" stroke-width="2"/>
      <rect x="0" y="0" width="222" height="4" fill="#C45C26"/>
      <text x="18" y="30" font-size="14" font-weight="700" fill="#0D3B2E">DAY 3</text>
      <text x="18" y="46" font-size="9.5" fill="#0D3B2E" opacity="0.6">Due date</text>

      <g font-size="9" fill="#0D3B2E">
        <circle cx="24" cy="68" r="3" fill="#C45C26"/>
        <text x="34" y="72" font-weight="700" fill="#C45C26">SMS — outstanding today</text>
        <circle cx="24" cy="90" r="3" fill="#C45C26"/>
        <text x="34" y="94" font-weight="700" fill="#C45C26">SMS — repeated, final</text>
        <circle cx="24" cy="112" r="3" fill="#0D3B2E"/>
        <text x="34" y="116">Email — last chance to pay</text>
      </g>

      <rect x="18" y="234" width="186" height="48" rx="10" fill="#C45C26"/>
      <text x="111" y="255" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFCF0">Due since today</text>
      <text x="111" y="270" text-anchor="middle" font-size="8.5" fill="#FFFCF0" opacity="0.85">Pay now to avoid fees</text>
    </g>
  </g>
</svg>
