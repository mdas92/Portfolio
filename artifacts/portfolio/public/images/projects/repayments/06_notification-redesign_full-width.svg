<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#FAFAFA"/>

  <rect x="48" y="36" width="8" height="2" fill="#FF4530"/>
  <text x="64" y="40" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" letter-spacing="3">BEFORE &amp; AFTER DUE DATE</text>
  <text x="48" y="76" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="600" fill="#111111" letter-spacing="-0.5">Two Components, Multiple States</text>
  <text x="48" y="100" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="13" fill="#737373">An inline notification that persists until dues are cleared, plus a new bottom sheet after the due date is breached.</text>

  <!-- OLD -->
  <g>
    <text x="72" y="140" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" letter-spacing="2">OLD</text>
    <rect x="64" y="152" width="200" height="270" rx="20" fill="#1A1A1A"/>
    <rect x="76" y="164" width="176" height="246" rx="10" fill="#0F0F0F"/>
    <rect x="96" y="180" width="40" height="10" rx="5" fill="rgba(255,255,255,0.2)"/>
    <rect x="88" y="200" width="160" height="60" rx="8" fill="#1F1F1F"/>
    <text x="98" y="222" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Bill Pay</text>
    <rect x="98" y="230" width="140" height="18" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="88" y="272" width="160" height="26" rx="6" fill="rgba(255,255,255,0.06)"/>
    <text x="98" y="289" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">₹5,500 is due</text>
    <text x="234" y="289" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">›</text>
    <rect x="88" y="380" width="160" height="24" rx="6" fill="rgba(255,255,255,0.04)"/>
    <text x="500" y="0" opacity="0"> </text>
  </g>

  <!-- Callout for old -->
  <line x1="264" y1="285" x2="300" y2="285" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="308" y="272" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#111111" font-weight="500">Easy to miss</text>
  <text x="308" y="290" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373">Buried below other cards,</text>
  <text x="308" y="306" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373">no urgency, no penalty shown.</text>

  <!-- Divider -->
  <line x1="480" y1="120" x2="480" y2="432" stroke="#E0E0E0" stroke-width="1"/>

  <!-- NEW -->
  <g>
    <text x="512" y="140" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#FF4530" letter-spacing="2">NEW</text>
    <rect x="504" y="152" width="200" height="270" rx="20" fill="#1A1A1A"/>
    <rect x="516" y="164" width="176" height="246" rx="10" fill="#FFFFFF"/>
    <rect x="536" y="180" width="60" height="10" rx="5" fill="#F2F2F2"/>
    <rect x="528" y="200" width="160" height="46" rx="8" fill="#FF4530"/>
    <text x="538" y="216" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="8.5" font-weight="700" fill="#FFFFFF">DUE BY 3 AUG</text>
    <text x="538" y="234" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">₹7,540.00 due</text>
    <rect x="528" y="254" width="76" height="40" rx="6" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="0.75"/>
    <rect x="612" y="254" width="76" height="40" rx="6" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="0.75"/>
    <rect x="528" y="306" width="160" height="70" rx="8" fill="#FFF5F4" stroke="#FF4530" stroke-width="1"/>
    <text x="538" y="326" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" font-weight="700" fill="#E03D2A">₹2,464.7 overdue</text>
    <text x="538" y="342" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="8.5" fill="#E03D2A">Repay now to avoid penalties</text>
    <rect x="538" y="352" width="140" height="16" rx="8" fill="#E03D2A"/>
    <text x="608" y="364" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="8" font-weight="600" fill="#FFFFFF" text-anchor="middle">PAY NOW</text>
  </g>

  <!-- Callout for new -->
  <text x="716" y="222" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#111111" font-weight="500">Clear &amp; upfront</text>
  <text x="716" y="240" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373">Amount and due date lead,</text>
  <text x="716" y="256" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373">with quick access to</text>
  <text x="716" y="272" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373">PayLater, XpressLoan, BillPay.</text>

  <text x="716" y="322" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#E03D2A" font-weight="500">After breach</text>
  <text x="716" y="340" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373">Bottom sheet explains what</text>
  <text x="716" y="356" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373">happens if the user still</text>
  <text x="716" y="372" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373">doesn't pay — fee, credit</text>
  <text x="716" y="388" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373">score, blocked limit.</text>
</svg>
