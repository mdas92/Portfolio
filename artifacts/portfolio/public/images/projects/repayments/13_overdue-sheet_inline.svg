<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 700" width="380" height="700">
  <rect width="380" height="700" fill="#FFFCF0"/>
  <circle cx="60" cy="60" r="90" fill="#C45C26" opacity="0.12"/>

  <g transform="translate(40,30)">
    <rect x="0" y="0" width="300" height="640" rx="32" fill="none" stroke="#0D3B2E" stroke-width="3" opacity="0.35"/>
    <rect x="16" y="30" width="268" height="60" rx="10" fill="none" stroke="#0D3B2E" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 3"/>
    <text x="30" y="55" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#0D3B2E" opacity="0.4">DUE SINCE 3 AUG</text>
    <text x="30" y="75" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#0D3B2E" opacity="0.4">₹2,464.7 overdue</text>

    <!-- overdue bottom sheet -->
    <g transform="translate(0,220)">
      <rect x="0" y="0" width="300" height="420" rx="24" fill="#FFFCF0" stroke="#0D3B2E" stroke-width="3"/>
      <rect x="0" y="0" width="300" height="8" rx="4" fill="#C45C26"/>
      <circle cx="270" cy="40" r="18" fill="none" stroke="#C45C26" stroke-width="2"/>
      <path d="M270 32 v10 M270 46 v2" stroke="#C45C26" stroke-width="2" stroke-linecap="round"/>

      <text x="24" y="52" font-family="'DM Serif Display', serif" font-size="21" fill="#0D3B2E">₹2,464.7 is overdue</text>
      <text x="24" y="74" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#0D3B2E" opacity="0.65">Please repay immediately to avoid</text>
      <text x="24" y="88" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#0D3B2E" opacity="0.65">more penalties</text>

      <text x="24" y="118" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#0D3B2E" opacity="0.5" letter-spacing="1">WHAT HAPPENS IF YOU DON'T PAY</text>

      <g font-family="'Space Grotesk', sans-serif">
        <circle cx="38" cy="150" r="14" fill="none" stroke="#C45C26" stroke-width="2"/>
        <text x="38" y="155" text-anchor="middle" font-size="12" fill="#C45C26" font-weight="700">1</text>
        <text x="62" y="146" font-size="13" font-weight="700" fill="#0D3B2E">Late fee of ₹150</text>
        <text x="62" y="164" font-size="10" fill="#0D3B2E" opacity="0.6">Fees pile up if unpaid</text>

        <circle cx="38" cy="200" r="14" fill="none" stroke="#C45C26" stroke-width="2"/>
        <text x="38" y="205" text-anchor="middle" font-size="12" fill="#C45C26" font-weight="700">2</text>
        <text x="62" y="196" font-size="13" font-weight="700" fill="#0D3B2E">Credit score impact</text>
        <text x="62" y="214" font-size="10" fill="#0D3B2E" opacity="0.6">Affects future loan chances</text>

        <circle cx="38" cy="250" r="14" fill="none" stroke="#C45C26" stroke-width="2"/>
        <text x="38" y="255" text-anchor="middle" font-size="12" fill="#C45C26" font-weight="700">3</text>
        <text x="62" y="246" font-size="13" font-weight="700" fill="#0D3B2E">Transactions blocked</text>
        <text x="62" y="264" font-size="10" fill="#0D3B2E" opacity="0.6">Can't use your limit anywhere</text>
      </g>

      <rect x="24" y="340" width="252" height="48" rx="8" fill="#0D3B2E"/>
      <text x="150" y="369" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" fill="#FFFCF0">Pay Now</text>
    </g>
  </g>
