<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <rect width="800" height="300" fill="#FAFAFA"/>

  <rect x="48" y="36" width="8" height="2" fill="#FF4530"/>
  <text x="64" y="40" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" letter-spacing="3">BETTER NAVIGATION</text>
  <text x="48" y="76" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="600" fill="#111111" letter-spacing="-0.5">Making Dues Easier to Find</text>
  <text x="48" y="100" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="13" fill="#737373">The old "Activity" tab didn't signal that dues lived there — a simple rename fixed a discoverability gap.</text>

  <!-- Callout bubble -->
  <rect x="220" y="128" width="360" height="56" rx="14" fill="#111111"/>
  <polygon points="392,184 408,184 396,200" fill="#111111"/>
  <text x="400" y="152" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="12.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">'Activity' is now 'Dues'</text>
  <text x="400" y="170" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">Track and pay dues and EMIs here</text>

  <!-- Nav bar -->
  <rect x="220" y="210" width="360" height="70" rx="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

  <g>
    <rect x="256" y="230" width="30" height="30" rx="8" fill="#111111"/>
    <polygon points="266,238 266,252 280,245" fill="#FFFFFF"/>
    <text x="271" y="272" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" font-weight="700" fill="#111111" text-anchor="middle">Home</text>
  </g>

  <g>
    <circle cx="400" cy="245" r="15" fill="none" stroke="#737373" stroke-width="2"/>
    <path d="M 400 232 A 13 13 0 1 1 388 245" fill="none" stroke="#737373" stroke-width="2"/>
    <polygon points="388,238 388,248 398,245" fill="#737373"/>
    <circle cx="410" cy="235" r="4" fill="#FF4530"/>
    <text x="400" y="272" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" text-anchor="middle">Dues</text>
  </g>

  <g>
    <circle cx="514" cy="240" r="8" fill="none" stroke="#737373" stroke-width="2"/>
    <path d="M 500 260 Q 500 246 514 246 Q 528 246 528 260" fill="none" stroke="#737373" stroke-width="2"/>
    <text x="514" y="272" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" text-anchor="middle">Profile</text>
  </g>
</svg>
