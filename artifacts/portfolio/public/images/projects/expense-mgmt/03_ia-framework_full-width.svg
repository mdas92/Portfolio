<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#FAFAFA"/>

  <rect x="48" y="36" width="8" height="2" fill="#FF4530"/>
  <text x="64" y="40" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" letter-spacing="3">INFORMATION ARCHITECTURE</text>
  <text x="48" y="76" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="600" fill="#111111" letter-spacing="-0.5">Expense IA Framework</text>

  <!-- Root node -->
  <rect x="300" y="108" width="200" height="44" rx="22" fill="#FF4530"/>
  <text x="400" y="135" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Expenses</text>

  <!-- Branch lines from root -->
  <line x1="400" y1="152" x2="400" y2="185" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="400" y1="185" x2="160" y2="185" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="400" y1="185" x2="640" y2="185" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="160" y1="185" x2="160" y2="210" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="400" y1="185" x2="400" y2="210" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="640" y1="185" x2="640" y2="210" stroke="#E0E0E0" stroke-width="2"/>

  <!-- Level 2 nodes -->
  <rect x="60" y="210" width="200" height="44" rx="6" fill="#1A1A1A" opacity="0.85"/>
  <text x="160" y="237" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle">Spends</text>

  <rect x="300" y="210" width="200" height="44" rx="6" fill="#F2F2F2" stroke="#E0E0E0" stroke-width="1"/>
  <text x="400" y="237" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#111111" text-anchor="middle">Bills &amp; Subscriptions</text>

  <rect x="540" y="210" width="200" height="44" rx="6" fill="#F2F2F2" stroke="#E0E0E0" stroke-width="1"/>
  <text x="640" y="237" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#111111" text-anchor="middle">Upcoming Payments</text>

  <!-- Note about Spends -->
  <text x="160" y="272" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10.5" fill="#737373" text-anchor="middle">Everyday transactions</text>

  <!-- Branch lines from Spends -->
  <line x1="160" y1="254" x2="160" y2="292" stroke="#E0E0E0" stroke-width="1.5"/>
  <line x1="160" y1="292" x2="80" y2="292" stroke="#E0E0E0" stroke-width="1.5"/>
  <line x1="160" y1="292" x2="240" y2="292" stroke="#E0E0E0" stroke-width="1.5"/>
  <line x1="80" y1="292" x2="80" y2="314" stroke="#E0E0E0" stroke-width="1.5"/>
  <line x1="240" y1="292" x2="240" y2="314" stroke="#E0E0E0" stroke-width="1.5"/>

  <!-- Category nodes -->
  <rect x="32" y="314" width="96" height="34" rx="17" fill="#F2F2F2" stroke="#E0E0E0" stroke-width="1"/>
  <text x="80" y="336" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#111111" text-anchor="middle">🍕 Food</text>

  <rect x="192" y="314" width="96" height="34" rx="17" fill="#F2F2F2" stroke="#E0E0E0" stroke-width="1"/>
  <text x="240" y="336" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#111111" text-anchor="middle">✈️ Travel</text>

  <!-- Key principles box -->
  <rect x="440" y="290" width="310" height="108" rx="6" fill="#F2F2F2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="440" y="290" width="310" height="3" rx="1.5" fill="#FF4530"/>
  <text x="456" y="312" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" letter-spacing="2">KEY RULES</text>
  <text x="456" y="336" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#111111">— Credit card bill ≠ Expense</text>
  <text x="456" y="356" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#111111">— Digital wallet top-up ≠ Expense</text>
  <text x="456" y="376" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#111111">— Any loss of immediate money = Expense</text>

  <!-- Not expenses box -->
  <rect x="48" y="380" width="360" height="1" fill="#E0E0E0"/>
  <text x="48" y="400" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373">Not expenses: paying credit card bills · loading wallets · account transfers</text>
</svg>