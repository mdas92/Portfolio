<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#0F0F1A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Grid dots -->
  <g opacity="0.07">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#FFFFFF"/>
    </pattern>
    <rect width="800" height="500" fill="url(#dots)"/>
  </g>

  <!-- Coral accent bar -->
  <rect x="60" y="60" width="4" height="48" rx="2" fill="#FF4530"/>

  <!-- Title block -->
  <text x="80" y="88" font-family="Georgia, serif" font-size="28" font-weight="600"
        fill="#FFFFFF" letter-spacing="-0.5">Building an In-App Chat Assistant</text>
  <text x="80" y="112" font-family="system-ui, sans-serif" font-size="12"
        fill="#FF4530" letter-spacing="3" text-transform="uppercase">CONVERSATION DESIGN · LAZYPAY</text>

  <!-- Chat bubbles - left column (bot) -->
  <g>
    <!-- Bot bubble 1 -->
    <rect x="60" y="160" width="220" height="40" rx="4" fill="#2A2A4A"/>
    <text x="80" y="185" font-family="system-ui, sans-serif" font-size="12" fill="#AAAACC">Hi! How can I help you today?</text>

    <!-- User bubble 1 -->
    <rect x="320" y="160" width="180" height="40" rx="4" fill="#FF4530" opacity="0.9"/>
    <text x="335" y="185" font-family="system-ui, sans-serif" font-size="12" fill="#FFFFFF">Account related issue</text>

    <!-- Branch lines -->
    <line x1="280" y1="200" x2="280" y2="240" stroke="#FF4530" stroke-width="1.5" opacity="0.6"/>
    <line x1="280" y1="240" x2="160" y2="265" stroke="#FF4530" stroke-width="1.5" opacity="0.6"/>
    <line x1="280" y1="240" x2="340" y2="265" stroke="#FF4530" stroke-width="1.5" opacity="0.6"/>
    <line x1="280" y1="240" x2="500" y2="265" stroke="#FF4530" stroke-width="1.5" opacity="0.6"/>

    <!-- Bot bubble 2 – branch options -->
    <rect x="60" y="265" width="200" height="36" rx="4" fill="#2A2A4A"/>
    <text x="78" y="288" font-family="system-ui, sans-serif" font-size="11" fill="#AAAACC">Can't log in</text>

    <rect x="272" y="265" width="200" height="36" rx="4" fill="#2A2A4A"/>
    <text x="290" y="288" font-family="system-ui, sans-serif" font-size="11" fill="#AAAACC">Account blocked</text>

    <rect x="484" y="265" width="200" height="36" rx="4" fill="#2A2A4A"/>
    <text x="500" y="288" font-family="system-ui, sans-serif" font-size="11" fill="#AAAACC">Delete account</text>

    <!-- Deeper branch lines -->
    <line x1="160" y1="301" x2="160" y2="340" stroke="#FF4530" stroke-width="1" opacity="0.35"/>
    <line x1="372" y1="301" x2="372" y2="340" stroke="#FF4530" stroke-width="1" opacity="0.35"/>
    <line x1="584" y1="301" x2="584" y2="340" stroke="#FF4530" stroke-width="1" opacity="0.35"/>

    <!-- Resolution nodes -->
    <rect x="100" y="340" width="120" height="28" rx="14" fill="#FF4530" opacity="0.7"/>
    <text x="160" y="359" font-family="system-ui, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">Self-serve steps</text>

    <rect x="312" y="340" width="120" height="28" rx="14" fill="#FF4530" opacity="0.7"/>
    <text x="372" y="359" font-family="system-ui, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">Escalate</text>

    <rect x="524" y="340" width="120" height="28" rx="14" fill="#FF4530" opacity="0.7"/>
    <text x="584" y="359" font-family="system-ui, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">Guide + ticket</text>
  </g>

  <!-- Stats row at bottom -->
  <rect x="0" y="420" width="800" height="80" fill="#0F0F1A" opacity="0.9"/>
  <text x="100" y="452" font-family="system-ui, sans-serif" font-size="11" fill="#737373" letter-spacing="2">SCALE</text>
  <text x="100" y="476" font-family="Georgia, serif" font-size="22" font-weight="600" fill="#FFFFFF">50K+ queries/mo</text>
  <text x="300" y="452" font-family="system-ui, sans-serif" font-size="11" fill="#737373" letter-spacing="2">RESOLUTION TARGET</text>
  <text x="300" y="476" font-family="Georgia, serif" font-size="22" font-weight="600" fill="#FF4530">60%</text>
  <text x="460" y="452" font-family="system-ui, sans-serif" font-size="11" fill="#737373" letter-spacing="2">SCOPE</text>
  <text x="460" y="476" font-family="Georgia, serif" font-size="22" font-weight="600" fill="#FFFFFF">5 product lines</text>
  <text x="640" y="452" font-family="system-ui, sans-serif" font-size="11" fill="#737373" letter-spacing="2">DURATION</text>
  <text x="640" y="476" font-family="Georgia, serif" font-size="22" font-weight="600" fill="#FFFFFF">2 months</text>
</svg>