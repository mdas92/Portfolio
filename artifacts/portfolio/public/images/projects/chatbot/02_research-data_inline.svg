<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#FFFFFF"/>

  <!-- Section label -->
  <rect x="48" y="38" width="6" height="2" fill="#6D28D9"/>
  <text x="62" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" letter-spacing="3">RESEARCH INSIGHT</text>
  <text x="48" y="76" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="600" fill="#111111" letter-spacing="-0.5">Top Query Categories</text>
  <text x="48" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6B7280">Share of 50,000+ monthly call centre queries (avg.)</text>

  <!-- Bar 1 — Account Related -->
  <text x="48" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#111111">Account Related</text>
  <rect x="48" y="132" width="700" height="44" rx="3" fill="#EDE9FE"/>
  <rect x="48" y="132" width="595" height="44" rx="3" fill="#6D28D9"/>
  <text x="655" y="159" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" fill="#6D28D9">21.1%</text>
  <text x="48" y="194" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9CA3AF">Can't log in, blocked accounts, deletion</text>

  <!-- Bar 2 — Loans & EMIs -->
  <text x="48" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#111111">Loans &amp; EMIs</text>
  <rect x="48" y="240" width="700" height="44" rx="3" fill="#EDE9FE"/>
  <rect x="48" y="240" width="412" height="44" rx="3" fill="#6D28D9" opacity="0.85"/>
  <text x="472" y="267" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" fill="#6D28D9">14.6%</text>
  <text x="48" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9CA3AF">Status, count, foreclosure queries</text>

  <!-- Bar 3 — Charges & Fees -->
  <text x="48" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#111111">Charges &amp; Fees</text>
  <rect x="48" y="348" width="700" height="44" rx="3" fill="#EDE9FE"/>
  <rect x="48" y="348" width="172" height="44" rx="3" fill="#6D28D9" opacity="0.70"/>
  <text x="232" y="375" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" fill="#6D28D9">6.1%</text>
  <text x="48" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9CA3AF">Fee structures, interest, waivers</text>

  <!-- Footer -->
  <rect x="48" y="428" width="704" height="1" fill="#E5E7EB"/>
  <text x="48" y="446" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9CA3AF">Source: Monthly customer care reports · used to define the chatbot's category tree</text>
</svg>
