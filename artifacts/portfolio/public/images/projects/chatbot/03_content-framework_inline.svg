<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#FAFAFA"/>

  <rect x="48" y="36" width="8" height="2" fill="#FF4530"/>
  <text x="64" y="40" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10" fill="#737373" letter-spacing="3">CONTENT GUIDELINES</text>
  <text x="48" y="76" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="600" fill="#111111" letter-spacing="-0.5">Framework Principles</text>

  <!-- Principle 1 -->
  <rect x="48" y="108" width="168" height="240" rx="6" fill="#F2F2F2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="48" y="108" width="168" height="4" rx="2" fill="#FF4530" opacity="0.9"/>
  <text x="66" y="142" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#FF4530" opacity="0.3">01</text>
  <text x="66" y="182" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="13" font-weight="600" fill="#111111">Empathetic tone</text>
  <text x="66" y="208" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">Users reaching out for help</text>
  <text x="66" y="228" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">are often frustrated. The bot</text>
  <text x="66" y="248" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">must be warm and reassuring.</text>
  <!-- Principle 2 -->
  <rect x="236" y="108" width="168" height="240" rx="6" fill="#F2F2F2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="236" y="108" width="168" height="4" rx="2" fill="#FF4530" opacity="0.8"/>
  <text x="254" y="142" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#FF4530" opacity="0.3">02</text>
  <text x="254" y="182" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="13" font-weight="600" fill="#111111">Co-operative</text>
  <text x="254" y="208" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">Provide information that is</text>
  <text x="254" y="228" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">relevant, truthful, and just</text>
  <text x="254" y="248" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">as much as is necessary.</text>
  <!-- Principle 3 -->
  <rect x="424" y="108" width="168" height="240" rx="6" fill="#F2F2F2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="424" y="108" width="168" height="4" rx="2" fill="#FF4530" opacity="0.7"/>
  <text x="442" y="142" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#FF4530" opacity="0.3">03</text>
  <text x="442" y="182" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="13" font-weight="600" fill="#111111">≤ 3 options per node</text>
  <text x="442" y="208" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">Simplify decision-making</text>
  <text x="442" y="228" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">while giving enough choices</text>
  <text x="442" y="248" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">at every level of the tree.</text>
  <!-- Principle 4 -->
  <rect x="612" y="108" width="168" height="240" rx="6" fill="#F2F2F2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="612" y="108" width="168" height="4" rx="2" fill="#FF4530" opacity="0.6"/>
  <text x="630" y="142" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#FF4530" opacity="0.3">04</text>
  <text x="630" y="182" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="13" font-weight="600" fill="#111111">User stays in control</text>
  <text x="630" y="208" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">User can always exit, go</text>
  <text x="630" y="228" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">back, or restart the flow</text>
  <text x="630" y="248" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11.5" fill="#737373">at any point.</text>
</svg>