  <text x="340" y="310" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" font-weight="500" fill="#111111">Powered by VISA</text>
  <text x="580" y="294" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10.5" fill="#737373">'Merchants' is too jargony for</text>
  <text x="580" y="310" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10.5" fill="#737373">target users</text>
  <line x1="48" y1="344" x2="752" y2="344" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="48" y="344" width="704" height="72" rx="0" fill="#FAFAFA"/>
  <text x="52" y="366" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" font-weight="600" fill="#111111">CTA button</text>
  <text x="108" y="366" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" fill="#737373" text-decoration="line-through">Claim your LazyCard now</text>
  <text x="340" y="366" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="11" font-weight="500" fill="#111111">Get your card</text>
  <text x="580" y="366" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10.5" fill="#737373">Shorter, simpler, lower reading level</text>
  <text x="580" y="382" font-family="system-ui, -apple-system, 'DM Sans', sans-serif" font-size="10.5" fill="#737373"></text>
  <line x1="48" y1="416" x2="752" y2="416" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="320" y1="116" x2="320" y2="416" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="570" y1="116" x2="570" y2="416" stroke="#E0E0E0" stroke-width="1"/>
