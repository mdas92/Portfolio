<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Mohana Das — Content Strategist & Product Thinker</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@100;300;400;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
    <script>
      // Restore path from GitHub Pages 404 redirect
      (function(l) {
        if (l.search[1] === 'p' && l.search[2] === '=') {
          var parts = l.search.slice(3).split('~s~');
          var restoredPath = parts[0].replace(/~and~/g, '&');
          var restoredSearch = parts[1] ? '?' + parts[1].replace(/~and~/g, '&') : '';
          window.history.replaceState(null, null, restoredPath + restoredSearch + l.hash);
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
