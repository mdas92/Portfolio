<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mohana Das</title>
  <script>
    // GitHub Pages SPA redirect
    // Encodes the requested path into a query param and sends to index.html
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?p=/' + l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '~s~' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
